name: PlayGear CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      - name: Build frontend
        working-directory: client
        run: npm run build

      - name: Install backend dependencies
        working-directory: server
        run: npm ci

      - name: Seed backend demo data
        working-directory: server
        env:
          MONGO_URI: mongodb://127.0.0.1:27017/playgear_ci
        run: npm run data:import

      - name: Start backend
        working-directory: server
        env:
          MONGO_URI: mongodb://127.0.0.1:27017/playgear_ci
        run: |
          npm start > server.log 2>&1 &

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5000/ > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend failed to become ready"
          exit 1

      - name: Run API smoke checks
        working-directory: server
        env:
          API_BASE_URL: http://127.0.0.1:5000
        run: npm run smoke:api

      - name: Upload backend logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: server/server.log
